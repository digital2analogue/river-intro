# Regenerates the visual regression baselines ON the CI runner and commits
# them. Run it from the Actions tab (or API) after intentional visual
# changes — baselines must be generated on the same environment that CI
# compares on, or font rasterization drift causes false failures.
name: Update visual baselines

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Regenerate baselines
        run: npm run test:visual:update

      - name: Commit refreshed baselines
        run: |
          if [ -z "$(git status --porcelain -- tests/visual/__screenshots__)" ]; then
            echo "Baselines unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/visual/__screenshots__
          git commit -m "chore: regenerate visual baselines on CI runner"
          # The branch can move while baselines regenerate (a session pushing
          # follow-up commits) — a rejected non-fast-forward push then fails
          # the whole run (observed in decisioning-table, 2026-07-02).
          # Rebase our baseline commit on top (favouring the fresh
          # screenshots) and retry.
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase -X theirs origin "$GITHUB_REF_NAME"
          done
          exit 1
